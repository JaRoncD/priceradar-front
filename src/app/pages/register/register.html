<div class="auth-page">
  <div class="auth-card card">

    <div class="auth-card__header">
      <span class="auth-card__logo">📡</span>
      <h1>PriceRadar</h1>
      <p class="text-muted">Crea tu cuenta</p>
    </div>

    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Email</label>
        <input
          class="input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@email.com"
        />
      </div>

      <div class="form-group">
        <label>Username</label>
        <input
          class="input"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="tu_usuario"
        />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          class="input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="mínimo 6 caracteres"
        />
      </div>

      <div class="auth-error" *ngIf="error">
        ⚠️ {{ error }}
      </div>

      <div class="auth-success" *ngIf="success">
        ✅ {{ success }}
      </div>

      <button
        class="btn btn-primary auth-submit"
        type="submit"
        [disabled]="loading"
      >
        {{ loading ? 'Creando cuenta...' : 'Registrarse' }}
      </button>

    </form>

    <p class="auth-footer text-muted">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </p>

  </div>
</div>
