<div class="auth-page">
  <div class="auth-card card">

    <div class="auth-card__header">
      <span class="auth-card__logo">📡</span>
      <h1>PriceRadar</h1>
      <p class="text-muted">Inicia sesión en tu cuenta</p>
    </div>

    <form (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Email</label>
        <input
          class="input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@email.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          class="input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <div class="auth-error" *ngIf="error">
        ⚠️ {{ error }}
      </div>

      <button
        class="btn btn-primary auth-submit"
        type="submit"
        [disabled]="loading"
      >
        {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>

    </form>

    <p class="auth-footer text-muted">
      ¿No tienes cuenta?
      <a routerLink="/register">Regístrate</a>
    </p>

  </div>
</div>
